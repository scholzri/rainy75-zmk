manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
  projects:
    - name: zmk
      remote: zmkfirmware
      # Reachable upstream ZMK. Our one local change (ZMK_USB_NO_VBUS_DETECT, needed
      # for battery deep sleep) is carried as patches/zmk-src/0001 and applied by
      # build.sh — this pin + that patch == the exact source this firmware was built
      # and tested against. Bump the two together if you move the pin.
      revision: 27afcb11efff6345d0ceb875e85c2de0673123f6
      path: zmk-src
      import: app/west.yml
    - name: hal_telink
      remote: zephyrproject-rtos
      revision: main
      path: modules/hal/hal_telink
    - name: mcuboot
      remote: zephyrproject-rtos
      revision: v2.2.0
      path: bootloader/mcuboot
  self:
    path: zmk
