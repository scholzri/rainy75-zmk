# Application configuration for Rainy 75 Pro (ZMK firmware)
# Applied via: -DEXTRA_CONF_FILE=$(pwd)/conf/app.conf

CONFIG_ZMK_KEYBOARD_NAME="Rainy 75 Pro"

# ── USB ──────────────────────────────────────────────────────────────────────
CONFIG_USB_DC_B91=y
CONFIG_ZMK_USB=y

# ── Logging ──────────────────────────────────────────────────────────────────
# No UART backend — logs go to internal ring buffer only.
# (B91 USB SRAM is 256B -> room for ONE CDC ACM next to HID; the console + mcumgr
#  DFU share that one port, so Studio runs over BLE. See "ZMK Studio" below.)
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=4096
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y

# ── MCUboot DFU ──────────────────────────────────────────────────────────────
# USB UART (primary) + BLE SMP (backup).
# USB:  mcumgr --conntype serial --connstring "dev=/dev/ttyACM0,baud=115200" image upload build/zephyr/zmk.signed.bin
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_MCUBOOT_BOOTLOADER_MODE_SWAP_USING_MOVE=y
CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=512
CONFIG_MCUMGR_TRANSPORT_NETBUF_COUNT=4
CONFIG_MCUMGR_TRANSPORT_NETBUF_USER_DATA_SIZE=8

# ── BLE ──────────────────────────────────────────────────────────────────────
# BLE controller blob (liblt_9518_zephyr.a, 2.8 MB). 1M PHY only —
# blob's 2M PHY causes LL Response Timeout 0x22 after 40s.
CONFIG_BT=y
CONFIG_BT_HCI=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_HCI_B91=y
CONFIG_BT_HCI_B91_RX_STACK_SIZE=2048
CONFIG_ZMK_BLE=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
# Passkey Entry: host displays 6-digit code, type it on the keyboard.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
# BLE privacy: DISABLED — blob doesn't support LE_Set_Random_Address.
# CONFIG_BT_PRIVACY=y

# ── HID indicators (CapsLock/NumLock LED feedback) ───────────────────────────
CONFIG_ZMK_HID_INDICATORS=y

# ── RGB Underglow ────────────────────────────────────────────────────────────
# 83 WS2812 per-key LEDs via PSPI + DMA on PB7. PC2 HIGH = LED VCC MOSFET.
# ZMK built-in underglow is OFF — rainy_rgb behavior handles RGB directly.
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_LED_STRIP_B91_SPI_PC2_POWER=y
CONFIG_RAINY_RGB=y

# ── Battery ADC ──────────────────────────────────────────────────────────────
# PD1 = battery voltage via 1/2 resistor divider (ADC channel 0x0A).
CONFIG_BATTERY_B91_ADC=y
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Deep Sleep ───────────────────────────────────────────────────────────────
# sys_poweroff → DEEPSLEEP_MODE (0x30, cold boot). Wakeup on any keypress.
# Retention mode (0x03) incompatible with MCUboot (boot ROM overwrites ILM).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_USB_NO_VBUS_DETECT=y

# ── ZMK Studio ───────────────────────────────────────────────────────────────
# Runtime keymap editing via https://zmk.studio over BLE (WebBluetooth).
# Unlock: press Fn+ESC.
#
# BLE-only BY DESIGN — do NOT add the studio-rpc-usb-uart snippet to get USB
# Studio. That adds a 2nd CDC ACM, but the B91's 256B USB SRAM fits only ONE
# (~136B each: bulk-in 64 + bulk-out 64 + notify 8) next to HID, and that one is
# already the console + mcumgr DFU port. A 2nd CDC ACM overflows the SRAM ->
# usb_dc_ep_configure() returns -ENOMEM -> USB stops enumerating at all (no
# console, no DFU, no Studio) -> only an EVK/SWS reflash recovers it. So we keep
# mcumgr DFU on USB and run Studio over BLE. (Details: docs/usage.md "ZMK Studio".)
CONFIG_ZMK_STUDIO=y
CONFIG_USB_MAX_NUM_TRANSFERS=8
CONFIG_ZMK_STUDIO_RPC_TX_BUF_SIZE=2048
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=64

# ── Raw flash management (for firmware restore) ──────────────────────────
CONFIG_FLASH_MGMT=y

# ── Debug (disabled for production) ─────────────────────────────────────────
# Boot diagnostic (.noinit SRAM buffer + PA7 SWS restore + GPIO markers)
CONFIG_BOOT_DIAG=y
# Kscan polling fallback (GPIO interrupts work with patches 0001+0002)
# CONFIG_ZMK_KSCAN_MATRIX_POLLING=y
