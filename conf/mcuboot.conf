# MCUboot configuration for Rainy 75 Pro (64KB boot partition)
# Build: west build -b rainy75 -d build-mcuboot bootloader/mcuboot/boot/zephyr \
#            -- -DEXTRA_CONF_FILE=$(pwd)/conf/mcuboot.conf \
#               -DEXTRA_DTC_OVERLAY_FILE=$(pwd)/conf/mcuboot.overlay \
#               "-DDTS_ROOT=$(pwd)/zmk;$(pwd)/zmk-src/app" \
#               "-DZMK_EXTRA_MODULES=$(pwd)/zmk;$(pwd)/zmk-src/app"

# ── Swap mode ────────────────────────────────────────────
CONFIG_BOOT_SWAP_USING_MOVE=y
# 0x70000 (448KB slot) / 0x1000 (4KB erase sector) = 112
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=112

# ── No signing (hash-only validation) ───────────────────
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
CONFIG_BOOT_VALIDATE_SLOT0=y

# ── Console/LOG disabled ─────────────────────────────────
# Single CDC ACM is shared between serial recovery and console.
# serial_adapter.c requires UART_CONSOLE=n when sharing the
# same CDC ACM device (build-time #error check).
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# ── USB CDC ACM (for serial recovery) ───────────────────
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_STACK=y

# ── Serial recovery over USB CDC ACM ────────────────────
# Enters recovery when no valid image exists in slot 0.
# Uses single CDC ACM device (cdc_acm_uart from main DTS).
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_CDC_ACM=y
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_BOOT_SERIAL_NO_APPLICATION=y
CONFIG_BOOT_MGMT_ECHO=y

# ── USB/threading (required by CDC ACM) ────────────────
CONFIG_MULTITHREADING=y

# ── Platform support ───────────────────────────────────
CONFIG_GPIO=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_HEAP_MEM_POOL_SIZE=8192

# ── Disable peripherals not needed by bootloader ──────
CONFIG_LED_STRIP_B91_SPI=n

# ── Misc ───────────────────────────────────────────────
CONFIG_BOOT_WATCHDOG_FEED=n
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_CBPRINTF_NANO=y
