# OTA Bridge configuration — monolithic firmware for stock-to-ZMK transition
#
# B91 boot ROM dual-bank boot: when stock firmware triggers OTA, the ROM
# switches the boot address to 0x40000 (bank 1) instead of copying. This
# means MCUboot-based bridges fail — MCUboot at 0x40000 looks for app at
# absolute flash 0x10000, but the app is at 0x50000 (0x40000 + 0x10000).
#
# Solution: monolithic bridge (no MCUboot). The bridge boots directly from
# bank 1, writes full ZMK combined.bin to flash 0x0 via flash_mgmt RAM
# trampoline, then resets. Boot ROM finds valid TLNK at 0x0, boots bank 0.
#
# Applied via: -DEXTRA_CONF_FILE=$(pwd)/conf/ota-bridge.conf

CONFIG_ZMK_KEYBOARD_NAME="Rainy 75 Bridge"

# ── No MCUboot — monolithic build ─────────────────────────────────────────────
# The bridge is a standalone Zephyr app. No bootloader, no signed images.
# Output: build-bridge/zephyr/zephyr.bin (raw binary starting at flash 0x0)
CONFIG_BOOTLOADER_MCUBOOT=n

# ── USB ──────────────────────────────────────────────────────────────────────
CONFIG_USB_DC_B91=y
CONFIG_ZMK_USB=y

# ── Logging (minimal) ────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=1024

# ── mcumgr (SMP serial transport) ────────────────────────────────────────────
# Custom group 64 (flash_mgmt) for raw flash erase/write/read/commit.
# OS group for reset command.
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=512
CONFIG_MCUMGR_TRANSPORT_NETBUF_USER_DATA_SIZE=8

# ── Raw flash management ─────────────────────────────────────────────────────
# Writes ZMK combined.bin to flash 0x0 via staging + RAM trampoline commit.
CONFIG_FLASH_MGMT=y

# ── Boot diagnostics ───────────────────────────────────────────────────────────
# BOOT_DIAG restores PA7 to SWS at POST_KERNEL (keeps EVK debug working)
# and records boot stages to .noinit SRAM buffer for debugging.
CONFIG_BOOT_DIAG=y
CONFIG_BOOT_DIAG_GPIO=y

# ── Explicitly disable everything else ────────────────────────────────────────
# No BLE (saves ~80-120KB)
CONFIG_BT=n
CONFIG_ZMK_BLE=n

# No RGB
CONFIG_ZMK_RGB_UNDERGLOW=n

# No battery ADC
CONFIG_BATTERY_B91_ADC=n
CONFIG_ZMK_BATTERY_REPORTING=n

# No deep sleep (bridge should stay awake for flash operations)
CONFIG_ZMK_SLEEP=n

# No Studio
CONFIG_ZMK_STUDIO=n
